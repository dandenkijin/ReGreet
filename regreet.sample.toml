# Whether to skip asking for username and session, and use the last used ones.
skip_selection = false

[background]
# Path to the background image/video
path = "/usr/share/backgrounds/greeter.jpg"

# How the background image covers the screen if the aspect ratio doesn't match
# Available values: "Fill", "Contain", "Cover", "ScaleDown"
# Refer to: https://docs.gtk.org/gtk4/enum.ContentFit.html
# NOTE: This is ignored if ReGreet isn't compiled with GTK v4.8 support.
fit = "Contain"

# The entries defined in this section will be passed to the session as environment variables when it is started
[env]
ENV_VARIABLE = "value"

[GTK]
# Whether to use the dark theme
application_prefer_dark_theme = true

# Cursor theme name
cursor_theme_name = "Adwaita"

# Whether to blink the cursor
cursor_blink = true

# Font name and size
font_name = "Cantarell 16"

# Icon theme name
icon_theme_name = "Adwaita"

# GTK theme name
theme_name = "Adwaita"

[commands]
# The command used to reboot the system
reboot = ["systemctl", "reboot"]

# The command used to shut down the system
poweroff = ["systemctl", "poweroff"]

# The command prefix for X11 sessions to start the X server
x11_prefix = [ "startx", "/usr/bin/env" ]

[appearance]
# The message that initially displays on startup
greeting_msg = "Welcome back!"

# FloGreet-compatible alias: enable glass effect with defaults
# enable_glass_effect = true
# glass_effect_type = "liquid"


[glass]
# Enable the liquid glass login card effect
enabled = true

# Backdrop blur radius in pixels (GTK 4.22+ required for blur)
blur = 25

# Base glass background opacity (0.0 = fully transparent, 1.0 = fully opaque)
opacity = 0.15

# Minimum opacity during the breathing animation (0.0–1.0)
opacity_min = 0.9

# Breathing animation duration (e.g. "4s", "2.5s")
duration = "4s"

# Card border radius in pixels
border_radius = 16

# Card border color (CSS color string)
border_color = "rgba(255, 255, 255, 0.25)"

# Inner highlight color (top-edge light catch)
highlight_color = "rgba(255, 255, 255, 0.25)"

# Outer shadow color
shadow_color = "rgba(0, 0, 0, 0.1)"

[widget.clock]
# strftime format argument
# See https://docs.rs/jiff/0.1.14/jiff/fmt/strtime/index.html#conversion-specifications
format = "%a %H:%M"

# How often to update the text
resolution = "500ms"

# Override system timezone (IANA Time Zone Database name, aka /etc/zoneinfo path)
# Remove to use the system time zone.
timezone = "America/Chicago"

# Ask GTK to make the label at least this wide. This helps keeps the parent element layout and width consistent.
# Experiment with different widths, the interpretation of this value is entirely up to GTK.
label_width = 150
